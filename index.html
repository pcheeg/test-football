<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Precision Slider Prototype</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
<h2>Football Stat Slider</h2>

<div class="buttons">
<button data-max="260">Goals</button>
<button data-max="653">Appearances</button>
<button data-max="1000">Stress Test</button>
</div>

<div id="value">0</div>

<div id="sliderArea">
<canvas id="slider" width="340" height="180"></canvas>
</div>

<p id="range">0–653</p>

<button id="submit">Submit</button>
<button id="new">New Target</button>

<div id="result"></div>
</div>
<script src="script.js"></script>
</body></html>
